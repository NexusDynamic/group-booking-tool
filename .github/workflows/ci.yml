name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit & server tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      # Browser (client) tests require a running display / Playwright browser install
      # and are skipped here. Run `pnpm test` locally to include them.
      - name: Run server tests
        run: pnpm vitest run --project server
