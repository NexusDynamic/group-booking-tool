services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      # SQLite database file — back this directory up regularly.
      - ./data:/data
    env_file: .env
    environment:
      # Override DATABASE_URL so the file lives in the mounted volume.
      DATABASE_URL: /data/booking.db
      PORT: '${APP_PORT:-3000}'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:${APP_PORT:-3000}/ > /dev/null 2>&1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Bind to loopback only — remove or change to "0.0.0.0:3000:3000" if you
    # need direct external access without the nginx proxy profile.
    # When using --profile proxy below this port is only needed for debugging.
    ports:
      - '127.0.0.1:${APP_PORT:-3000}:${APP_PORT:-3000}'

  # Daily GDPR anonymisation job.
  # Runs pnpm anonymize at 02:00 UTC every day using the same image and data
  # volume as the app service. Waits for the app to be healthy first so the
  # schema is always applied before the first sweep.
  anonymize:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      DATABASE_URL: /data/booking.db
    entrypoint: ['/bin/sh', '-c']
    command: "echo '0 2 * * * cd /app && node --import tsx src/lib/server/run-anonymize.ts >> /proc/1/fd/1 2>&1' | crontab - && crond -f -l 8"
    depends_on:
      app:
        condition: service_healthy

  # Optional nginx reverse proxy.
  # Start with:  docker compose --profile proxy up -d
  # When running behind nginx you can remove the ports block from the app
  # service above so port 3000 is not exposed to the host at all.
  nginx:
    image: nginx:alpine
    profiles: ['proxy']
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Default: HTTPS. For HTTP-only dev/testing swap in nginx-insecure.conf.
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount the Let's Encrypt directory so nginx can read the certificates:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
