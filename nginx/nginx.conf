# Nginx reverse proxy configuration for the Group Booking Tool — HTTPS.
#
# Replace "booking.example.org" with your actual domain throughout this file.
#
# --- Obtaining a certificate with certbot (recommended) ---
#
#   # Install certbot (Debian/Ubuntu):
#   sudo apt install certbot python3-certbot-nginx
#
#   # Issue and install a certificate (certbot will patch this file):
#   sudo certbot --nginx -d booking.example.org
#
# If you manage certificates another way, point the ssl_certificate* directives
# at your files and adjust as needed.

upstream booking_app {
    server app:3000;
    keepalive 32;
}

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name booking.example.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name booking.example.org;

    # --- TLS certificates ---
    # Certbot typically places certificates here:
    ssl_certificate     /etc/letsencrypt/live/booking.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/booking.example.org/privkey.pem;

    # Modern TLS settings (TLS 1.2+ only, strong ciphers).
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS — tells browsers to always use HTTPS for this domain.
    # Remove or shorten max-age during initial testing.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    location / {
        proxy_pass         http://booking_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
