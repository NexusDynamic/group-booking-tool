# Nginx reverse proxy configuration for the Group Booking Tool — HTTP only.
#
# FOR DEVELOPMENT / LOCAL TESTING ONLY.
# Do not use this in production; all traffic including session cookies will be
# transmitted in plain text.
#
# To use this file instead of the default:
#   1. Edit the nginx volumes block in docker-compose.yml to mount this file:
#        - ./nginx/nginx-insecure.conf:/etc/nginx/conf.d/default.conf:ro
#   2. Restart the nginx container:
#        docker compose --profile proxy restart nginx

# GDPR: anonymize client IP addresses before logging.
# IPv4: zero the last octet  (e.g. 1.2.3.4   → 1.2.3.0).
# IPv6: truncate to /64      (e.g. 2001:db8::1 → 2001:db8::).
map $remote_addr $remote_addr_anon {
    ~(?P<ip>\d+\.\d+\.\d+)\.   $ip.0;
    ~(?P<ip>[^:]+:[^:]+):       $ip::;
    default                     0.0.0.0;
}

log_format anon '$remote_addr_anon - $remote_user [$time_local] '
                '"$request" $status $body_bytes_sent '
                '"$http_referer" "$http_user_agent"';

upstream booking_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # Accept any hostname — fine for local / LAN use.

    access_log /var/log/nginx/access.log anon;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    location / {
        proxy_pass         http://booking_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
