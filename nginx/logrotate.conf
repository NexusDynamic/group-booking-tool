# Nginx log rotation — 7-day retention for GDPR compliance.
#
# FOR BARE-METAL / VM DEPLOYMENTS ONLY.
# Docker containers write nginx logs to /dev/stdout by default; log retention
# is then handled by the container runtime (e.g. Docker's --log-opt max-file).
# This file is only needed when nginx writes to real files on disk.
#
# Installation:
#   sudo cp nginx/logrotate.conf /etc/logrotate.d/booking-nginx
#
# The postrotate script sends nginx a USR1 signal so it reopens its log files
# after rotation.  For Docker deployments this is handled differently — see the
# Docker logging documentation.

/var/log/nginx/*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        nginx -s reopen 2>/dev/null || true
    endscript
}
